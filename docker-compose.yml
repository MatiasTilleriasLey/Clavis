# Solo Postgres + Redis para dev. Flask corre local en venv.
# ponytail: la app no va en compose todavía — se agrega cuando haya algo que dockerizar de verdad.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: clavis
      POSTGRES_PASSWORD: clavis
      POSTGRES_DB: clavis
    ports:
      - "127.0.0.1:5432:5432"   # bind solo a localhost (threat model §6.1)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clavis"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"

  # SMTP de dev: captura los mails, no los envía. UI en http://127.0.0.1:8027
  # Puertos no estándar para no chocar con otros Mailpit en la misma máquina.
  # Para SMTP real, cambiar las vars MAIL_* del .env (no toca este contenedor).
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "127.0.0.1:1026:1025"   # SMTP
      - "127.0.0.1:8027:8025"   # UI web

volumes:
  pgdata:
