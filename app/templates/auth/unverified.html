{% extends "base.html" %}
{% block content %}
<h1>Cuenta sin verificar</h1>
<p>Revisá tu correo y hacé click en el link de verificación para activar tu cuenta.</p>
<form method="post" action="{{ url_for('auth.logout') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <button type="submit">Salir</button>
</form>
{% endblock %}
