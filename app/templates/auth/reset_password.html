{% extends "base.html" %}
{% block content %}
<h1>Nueva contraseña</h1>
<form method="post" action="{{ url_for('auth.reset_password', token=token) }}">
  {{ form.hidden_tag() }}
  <p>{{ form.password.label }}<br>{{ form.password(size=40) }}
    {% for e in form.password.errors %}<span>{{ e }}</span>{% endfor %}</p>
  <p>{{ form.submit() }}</p>
</form>
{% endblock %}
