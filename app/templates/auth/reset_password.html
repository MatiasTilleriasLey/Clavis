{% extends "base.html" %}
{% block title %}Nueva contraseña — Clavis{% endblock %}
{% block content %}
<div class="card auth-card">
  <h1>Nueva contraseña</h1>
  <form method="post" action="{{ url_for('auth.reset_password', token=token) }}">
    {{ form.hidden_tag() }}
    <div class="field">
      {{ form.password.label }} {{ form.password() }}
      {% for e in form.password.errors %}<span class="error">{{ e }}</span>{% endfor %}
    </div>
    {{ form.submit() }}
  </form>
</div>
{% endblock %}
