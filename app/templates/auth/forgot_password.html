{% extends "base.html" %}
{% block content %}
<h1>Recuperar contraseña</h1>
<form method="post">
  {{ form.hidden_tag() }}
  <p>{{ form.email.label }}<br>{{ form.email(size=40) }}
    {% for e in form.email.errors %}<span>{{ e }}</span>{% endfor %}</p>
  <p>{{ form.submit() }}</p>
</form>
<p><a href="{{ url_for('auth.login') }}">Volver al login</a></p>
{% endblock %}
