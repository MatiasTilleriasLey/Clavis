{% extends "base.html" %}
{% block content %}
<h1>Login</h1>
<form method="post">
  {{ form.hidden_tag() }}
  <p>{{ form.email.label }}<br>{{ form.email(size=40) }}</p>
  <p>{{ form.password.label }}<br>{{ form.password(size=40) }}</p>
  <p>{{ form.submit() }}</p>
</form>
<p><a href="{{ url_for('auth.register') }}">Crear cuenta</a></p>
{% endblock %}
